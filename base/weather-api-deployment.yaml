apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
        - name: api
          image: YOUR_REGISTRY/weather-spectrum:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "/app/api.py"]
          envFrom:
            - configMapRef:
                name: weather-spectrum-config
          ports:
            - containerPort: 8080