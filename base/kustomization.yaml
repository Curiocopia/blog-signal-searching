apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: weather-spectrum

configMapGenerator:
- name: weather-spectrum-run-window
  env: weather-spectrum-run-window.env
- name: weather-spectrum-config
  env: weather-spectrum-config.env
- name: weather-spectrum-locations
  files:
    - locations.json

labels:
  - pairs:
      app: blog-signal-searching
    includeSelectors: false

resources:
  - weather-spectrum-pvc.yaml
  - weather-fetch-job.yaml
  - weather-analyze-job.yaml
  - weather-reduce-job.yaml
  - weather-db-deployment.yaml
  - weather-db-service.yaml
  - weather-api-deployment.yaml
  - weather-api-service.yaml